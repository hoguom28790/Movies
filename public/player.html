<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Ho Phim Premium Player v4.0</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <style>
    :root { 
      --plyr-color-main: #3b82f6; 
      --plyr-video-background: #000;
      --premium-blue: #3b82f6;
      --plyr-font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player-container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
    
    /* Premium Glassmorphism UI */
    .plyr--video { border-radius: 0; height: 100% !important; width: 100% !important; background: #000 !important; }
    .plyr__controls { 
      background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.8)) !important; 
      padding-top: 60px !important;
      padding-bottom: 20px !important;
    }
    .plyr__control--overlaid {
      background: rgba(59, 130, 246, 0.4) !important;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    #loader { position: absolute; inset:0; background:#000; z-index: 2000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .spinner { 
        width: 60px; height: 60px; border: 3px solid rgba(255,255,255,0.05); border-top: 3px solid var(--premium-blue); border-radius: 50%; 
        animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #osd { 
        position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); backdrop-filter: blur(30px); 
        border: 1px solid rgba(255,255,255,0.1); padding: 12px 28px; border-radius: 50px; 
        color: white; z-index: 1000; display: none; font-weight: 900; font-size: 12px; 
        text-transform: uppercase; letter-spacing: 0.3em; pointer-events: none;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        pointer-events: none;
        white-space: nowrap;
    }

    @keyframes fadeDown {
        from { opacity: 0; transform: translate(-50%, -20px); }
        to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* Skip Ripple Effect */
    .ripple-container { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; }
    .ripple-half { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
    .ripple-icon { 
        width: 100px; height: 100px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        scale: 0.5; transition: scale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .ripple-active { opacity: 1; }
    .ripple-active .ripple-icon { scale: 1; }

    #video-element { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <div id="player-container">
    <video id="video-element" playsinline crossorigin="anonymous"></video>
    <iframe id="embed-frame" style="display:none; position:absolute; inset:0; width:100%; height:100%; border:none; z-index:100;" allowfullscreen></iframe>
    
    <div id="loader">
       <div class="spinner"></div>
       <div style="margin-top:24px; text-align:center;">
           <span style="color:white; font-weight:900; font-size:12px; letter-spacing:0.5em; text-transform:uppercase; display:block; margin-bottom:8px; opacity: 0.8;">Hồ Phim</span>
           <span style="color:var(--premium-blue); font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:0.2em;">Premium Cinema v4.0</span>
       </div>
    </div>

    <div id="osd"></div>

    <div class="ripple-container">
        <div id="ripple-left" class="ripple-half"><div class="ripple-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></div></div>
        <div id="ripple-right" class="ripple-half"><div class="ripple-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M11.5 8c2.65 0 5.05 1 6.9 2.6L22 7v9h-9l3.62-3.62c-1.39-1.16-3.16-1.88-5.12-1.88-3.54 0-6.55 2.31-7.6 5.5l-2.37-.78C2.92 11.03 6.85 8 11.5 8z"/></svg></div></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const isEmbed = urlParams.get('isEmbed') === 'true';
    const initialTime = parseFloat(urlParams.get('time')) || 0;
    
    const video = document.getElementById('video-element');
    const embedFrame = document.getElementById('embed-frame');
    const loader = document.getElementById('loader');
    const osd = document.getElementById('osd');
    
    let player = null;
    let hls = null;

    function showOSD(text) {
      osd.innerText = text;
      osd.style.display = 'block';
      osd.style.animation = 'none';
      osd.offsetHeight;
      osd.style.animation = 'fadeDown 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards';
      setTimeout(() => { if(osd.style.display === 'block') osd.style.display = 'none'; }, 2500);
    }

    function initPlayer() {
      const isHlsUrl = (
        source.includes('.m3u8') ||
        source.includes('m3u8') ||
        source.includes('.ts?') ||
        source.includes('/hls/') ||
        source.includes('/live/') ||
        source.includes('googlevideo.com') ||
        source.includes('akamaized.net') ||
        source.includes('cloudfront.net') ||
        (source.includes('.php?') && !source.includes('embed'))
      );
      
      const plyrOptions = {
        controls: [
          'play-large', 'play', 'fast-forward', 'progress', 'current-time', 'duration',
          'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'
        ],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
        quality: { default: 0, options: [0], forced: true, onChange: (e) => updateQuality(e) },
        keyboard: { focused: true, global: true },
        tooltips: { controls: true, seek: true },
        displayDuration: true,
        invertTime: false,
        i18n: { speed: 'Tốc độ', quality: 'Chất lượng', loop: 'Lặp lại', start: 'Bắt đầu', end: 'Kết thúc', unmute: 'Bật âm', mute: 'Tắt âm' }
      };

      let networkRetryCount = 0;
      if (isHlsUrl && Hls.isSupported()) {
        hls = new Hls({ 
            capLevelToPlayerSize: true,
            autoStartLoad: true,
            enableWorker: true,
            maxBufferLength: 60,
            backBufferLength: 30,
            startLevel: -1
        });
        
        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            switch(data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                if (networkRetryCount < 2) {
                    networkRetryCount++;
                    console.log("[Player] Network error, retrying...");
                    hls.startLoad();
                } else {
                    console.log("[Player] Network error limit reached, falling back to embed");
                    fallbackToEmbed();
                }
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log("[Player] Media error, recovering...");
                hls.recoverMediaError();
                break;
              default:
                console.log("[Player] Fatal error, falling back to embed");
                fallbackToEmbed();
                break;
            }
          }
        });

        function fallbackToEmbed() {
            if (source.includes('topxx.vip') || source.includes('avdbapi.com')) {
              embedFrame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');
            } else {
              embedFrame.removeAttribute('sandbox');
            }
            embedFrame.src = source;
            embedFrame.style.display = 'block';
            video.style.display = 'none';
            setTimeout(() => {
                window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
                loader.style.opacity = '0';
                loader.style.pointerEvents = 'none';
            }, 1000);
        }
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            const hlsQualities = hls.levels.map(l => l.height);
            const uniqueQualities = [...new Set(hlsQualities)].sort((a,b) => b-a);
            
            player = new Plyr(video, {
                ...plyrOptions,
                quality: {
                    default: 0,
                    options: [0, ...uniqueQualities],
                    forced: true,
                    onChange: (q) => {
                        if (q === 0) hls.currentLevel = -1;
                        else hls.currentLevel = hls.levels.findIndex(l => l.height === q);
                        showOSD(q === 0 ? "Chất lượng: Tự động" : "Chất lượng: " + q + "p");
                    }
                }
            });
            setupEvents();
        });

        hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
            if (hls.autoLevelEnabled) {
                const level = hls.levels[data.level];
                if (level) console.log("[Player] Auto switched to " + level.height + "p");
            }
        });
      } else {
        video.src = source;
        player = new Plyr(video, plyrOptions);
        setupEvents();
        
        // Handle MP4/direct video failure
        video.addEventListener('error', () => {
           console.log("[Player] Video element error, falling back to embed");
           if (source.includes('topxx.vip') || source.includes('avdbapi.com')) {
              embedFrame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');
           } else {
              embedFrame.removeAttribute('sandbox');
           }
           embedFrame.src = source;
           embedFrame.style.display = 'block';
           video.style.display = 'none';
           setTimeout(() => {
             window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
             loader.style.opacity = '0';
             loader.style.pointerEvents = 'none';
           }, 1000);
        });
      }
    }

    function setupEvents() {
      player.on('ready', () => {
          if (initialTime > 0) {
              video.currentTime = initialTime;
              showOSD("Đã khôi phục: " + formatTime(initialTime));
          }
          window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
      });

      player.on('play', () => {
          window.parent.postMessage({ type: 'VIDEO_PLAY' }, '*');
          loader.style.opacity = '0';
      });

      player.on('pause', () => window.parent.postMessage({ type: 'VIDEO_PAUSE' }, '*'));
      
      video.addEventListener('timeupdate', () => {
        window.parent.postMessage({ type: 'UPDATE_PROGRESS', time: video.currentTime, duration: video.duration }, '*');
      });

      // Speed change notification
      player.on('ratechange', () => {
          showOSD("Tốc độ: " + player.speed + "x");
      });

      // Double-click skip
      let lastTap = 0;
      document.getElementById('player-container').addEventListener('mousedown', (e) => {
          if (e.target.closest('.plyr__controls')) return;
          const now = Date.now();
          if (now - lastTap < 300) {
              const rect = e.currentTarget.getBoundingClientRect();
              const x = e.clientX - rect.left;
              if (x < rect.width / 2) skip(-10, 'left');
              else skip(10, 'right');
          }
          lastTap = now;
      });
    }

    function skip(seconds, direction) {
        if (!video) return;
        video.currentTime += seconds;
        const ripple = document.getElementById('ripple-' + direction);
        ripple.classList.add('ripple-active');
        setTimeout(() => ripple.classList.remove('ripple-active'), 500);
        showOSD(seconds > 0 ? "+10s" : "-10s");
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return (h > 0 ? h + ":" : "") + (m < 10 && h > 0 ? "0" + m : m) + ":" + (sec < 10 ? "0" + sec : sec);
    }

    if (source) {
      if (isEmbed) {
        if (source.includes('topxx.vip') || source.includes('avdbapi.com')) {
          embedFrame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');
        } else {
          embedFrame.removeAttribute('sandbox');
        }
        embedFrame.src = source;
        embedFrame.style.display = 'block';
        video.style.display = 'none';
        setTimeout(() => {
          window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
        }, 1500);
      } else {
        initPlayer();
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data.type === 'SEEK') {
         video.currentTime = e.data.time;
         video.play().catch(() => {});
      }
    });

    window.addEventListener('keydown', (e) => {
       if (e.code === 'KeyM') { player.muted = !player.muted; showOSD(player.muted ? "Tắt âm" : "Bật âm"); }
       if (e.code === 'KeyF') { player.fullscreen.toggle(); }
       if (e.code === 'KeyP') { player.pip = true; }
       if (e.code === 'ArrowRight') { skip(10, 'right'); }
       if (e.code === 'ArrowLeft') { skip(-10, 'left'); }
       if (e.code === 'ArrowUp') { player.volume += 0.1; showOSD("Âm lượng: " + Math.round(player.volume * 100) + "%"); }
       if (e.code === 'ArrowDown') { player.volume -= 0.1; showOSD("Âm lượng: " + Math.round(player.volume * 100) + "%"); }
    });
  </script>
</body>
</html>
