<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Player Pro</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      font-family: inherit;
    }
    .plyr {
      width: 100%;
      height: 100%;
    }
    :root {
      --plyr-color-main: #0063e5; /* Disney Blue */
    }

    #error-msg {
      display: none;
      color: white;
      text-align: center;
      padding: 2rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    
    /* Seek buttons on overlay */
    .custom-skip {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .plyr--hover .custom-skip, .plyr--paused .custom-skip {
      opacity: 1;
    }
    .skip-back { left: 15%; }
    .skip-forward { right: 15%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>
<body>
  <div id="player-container" style="width: 100%; height: 100%;">
    <video id="video" playsinline crossorigin="anonymous"></video>
    <button class="custom-skip skip-back" onclick="skip(-10)" title="Lùi 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
    </button>
    <button class="custom-skip skip-forward" onclick="skip(10)" title="Tiến 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
    </button>
  </div>
  
  <div id="error-msg"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const theme = urlParams.get('theme') || 'default';
    if (theme !== 'default') document.body.classList.add('theme-' + theme);

    const video = document.getElementById('video');
    const errorMsg = document.getElementById('error-msg');
    let hls;

    function skip(seconds) {
      video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
    }

    // Pro Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

      const act = () => { if (video.paused) video.play(); else video.pause(); };

      switch(e.key.toLowerCase()) {
        case ' ': // Space uses empty string or ' ' technically
        case 'k': e.preventDefault(); act(); break;
        case 'f': e.preventDefault(); if(player) player.fullscreen.toggle(); break;
        case 'm': e.preventDefault(); if(player) player.muted = !player.muted; break;
        case 'j': e.preventDefault(); skip(-10); break;
        case 'l': e.preventDefault(); skip(10); break;
        case 'arrowright': e.preventDefault(); skip(e.shiftKey ? 5 : 10); break;
        case 'arrowleft': e.preventDefault(); skip(e.shiftKey ? -5 : -10); break;
        case 'arrowup': e.preventDefault(); if(player) player.volume = Math.min(1, player.volume + 0.1); break;
        case 'arrowdown': e.preventDefault(); if(player) player.volume = Math.max(0, player.volume - 0.1); break;
        case '>': case '.': e.preventDefault(); if(player) player.speed = Math.min(2, player.speed + 0.25); break;
        case '<': case ',': e.preventDefault(); if(player) player.speed = Math.max(0.5, player.speed - 0.25); break;
      }
    });

    // Double Tap to Seek for Mobile (Left/Right Sides)
    let lastTapTime = 0;
    document.getElementById('player-container').addEventListener('click', (e) => {
      // Ignore if clicking on controls or buttons
      if (e.target.closest('.plyr__controls') || e.target.closest('button')) return;
      
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTapTime;
      
      if (tapLength < 300 && tapLength > 0) {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        if (clickX < rect.width / 2) {
          skip(-10);
          showRipple('left');
        } else {
          skip(10);
          showRipple('right');
        }
        e.preventDefault();
      }
      lastTapTime = currentTime;
    });

    function showRipple(side) {
      const btn = side === 'left' ? document.querySelector('.skip-back') : document.querySelector('.skip-forward');
      if(btn) {
        btn.style.opacity = '1';
        btn.style.transform = `translateY(-50%) scale(1.5)`;
        setTimeout(() => {
          btn.style.opacity = '0';
          btn.style.transform = `translateY(-50%) scale(1)`;
        }, 500);
      }
    }

    if (source) {
      // Initialize Plyr
      const player = new Plyr(video, {
        controls: [
          'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 
          'captions', 'settings', 'pip', 'airplay', 'fullscreen'
        ],
        settings: ['quality', 'speed', 'loop'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        tooltips: { controls: true, seek: true },
        keyboard: { focused: false, global: false }, // Use our custom pro keyboard listener instead
        fullscreen: { iosNative: true, fallback: true },
        storage: { enabled: true, key: 'disney-player' }, // Smart memory
      });

      player.on('ended', () => {
        window.parent.postMessage({ type: 'VIDEO_ENDED', url: source }, '*');
      });

      if (Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30 });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
              default:
                hls.destroy();
                document.getElementById('player-container').style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<h2>Lỗi tải Video</h2><p>Vui lòng thử server khác.</p>';
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = source;
      }

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (hls) hls.destroy();
        player.destroy();
      });

    } else {
      document.getElementById('player-container').style.display = 'none';
    }
  </script>
</body>
</html>
