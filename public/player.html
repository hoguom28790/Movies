<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Ho Phim Premium Player</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <style>
    :root { 
      --plyr-color-main: #3b82f6; 
      --plyr-video-background: #000;
      --premium-blue: #3b82f6;
    }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #player-container { width: 100%; height: 100%; position: relative; }
    .plyr--video { border-radius: 0; }
    .plyr__controls { background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.8)) !important; padding-top: 40px !important; }
    
    #loader { position: absolute; inset:0; background:#000; z-index: 2000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.5s; pointer-events:none; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--premium-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #osd { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 12px; color: white; z-index: 1000; display: none; font-weight: bold; font-size: 11px; }
  </style>
</head>
<body>
  <div id="player-container">
    <video id="video-element" playsinline crossorigin="anonymous"></video>
    <iframe id="embed-frame" style="display:none; position:absolute; inset:0; width:100%; height:100%; border:none; z-index:100;" allowfullscreen></iframe>
    
    <div id="loader">
       <div class="spinner"></div>
       <span style="color:white; margin-top:20px; font-weight:bold; font-size:12px; letter-spacing:0.2em; text-transform:uppercase;">Loading</span>
    </div>

    <div id="osd"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const isEmbed = urlParams.get('isEmbed') === 'true';
    const video = document.getElementById('video-element');
    const embedFrame = document.getElementById('embed-frame');
    const loader = document.getElementById('loader');
    const osd = document.getElementById('osd');
    let hls = null;

    function showOSD(text) {
      osd.innerText = text;
      osd.style.display = 'block';
      setTimeout(() => osd.style.display = 'none', 3000);
    }

    if (source) {
      if (isEmbed) {
        embedFrame.src = source;
        embedFrame.style.display = 'block';
        video.style.display = 'none';
        setTimeout(() => {
          window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
          loader.style.opacity = '0';
        }, 1500);
      } else {
        const isHlsUrl = source.includes('m3u8') || source.includes('streamxx') || source.includes('hls');
        
        if (isHlsUrl && Hls.isSupported()) {
          hls = new Hls({ capLevelToPlayerSize: true });
          hls.loadSource(source);
          hls.attachMedia(video);
        } else {
          video.src = source;
        }

        const player = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
          keyboard: { focused: true, global: true },
          tooltips: { controls: true, seek: true }
        });

        video.addEventListener('timeupdate', () => {
          window.parent.postMessage({ type: 'UPDATE_PROGRESS', time: video.currentTime, duration: video.duration }, '*');
        });

        video.onplay = () => {
          window.parent.postMessage({ type: 'VIDEO_PLAY' }, '*');
          loader.style.opacity = '0';
        };

        video.onpause = () => window.parent.postMessage({ type: 'VIDEO_PAUSE' }, '*');

        setTimeout(() => {
          window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
          loader.style.opacity = '0';
        }, 1000);
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data.type === 'HANDSHAKE_PING') {
         window.parent.postMessage({ type: 'HANDSHAKE_PONG' }, '*');
      }
      if (e.data.type === 'SEEK') {
         video.currentTime = e.data.time;
         video.play().catch(() => {});
         showOSD("Đã khôi phục vị trí xem");
      }
    });

    window.addEventListener('keydown', (e) => {
       if (e.code === 'Space') { 
          e.preventDefault(); 
          if (video.paused) video.play().catch(() => {}); else video.pause(); 
       }
       if (e.code === 'ArrowRight') { video.currentTime += 10; }
       if (e.code === 'ArrowLeft') { video.currentTime -= 10; }
    });
  </script>
</body>
</html>
