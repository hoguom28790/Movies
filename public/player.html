<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Ho Phim Premium Player</title>
  <!-- Upgraded player by referencing NyumatFlix: auto-resume, seek preview, refined skip intro, strong progress sync -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <style>
    :root { 
      --plyr-color-main: #3b82f6; 
      --plyr-video-background: #000;
      --premium-blue: #3b82f6;
    }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #player-container { width: 100%; height: 100%; position: relative; }
    
    /* Premium UI Tweaks */
    .plyr--video { border-radius: 0; }
    .plyr__controls { background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.8)) !important; padding-top: 40px !important; }
    
    /* Seek Preview Thumbnail */
    #seek-preview {
      position: absolute;
      bottom: 80px;
      left: 0;
      width: 160px;
      height: 90px;
      background: #000;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateX(-50%);
    }
    #preview-video { width: 100%; height: 100%; object-fit: cover; }
    #seek-time {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
    }

    /* Refined Skip Intro Button */
    #skip-intro-btn {
      position: absolute;
      bottom: 100px;
      right: 30px;
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(10, 10, 12, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 12px 24px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 800;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: skipIn 0.5s ease;
    }
    #skip-intro-btn:hover { background: var(--premium-blue); border-color: var(--premium-blue); transform: scale(1.05); }
    @keyframes skipIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* OSD Messages */
    #osd { position: absolute; top: 40px; right: 40px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 20px; color: white; z-index: 1000; display: none; align-items: center; gap: 12px; font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    
    /* Resume Logic UI */
    #resume-loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 500; flex-direction: column; align-items: center; gap: 20px; }
    .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--premium-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    #resume-loader span { color: white; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
    #resume-toast { display: none; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(10,10,12,0.9); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); padding: 20px 30px; border-radius: 32px; z-index: 900; align-items: center; gap: 24px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); animation: toastIn 0.6s cubic-bezier(0.16,1,0.3,1); }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from { bottom: 80px; opacity: 0; transform: translate(-50%, 20px); } to { bottom: 120px; opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>
  <div id="player-container">
    <video id="video" playsinline crossorigin="anonymous" preload="metadata"></video>
    <video id="preview-video" muted playsinline style="display:none;" crossorigin="anonymous"></video>
    
    <div id="seek-preview">
        <video id="preview-player" muted playsinline></video>
        <div id="seek-time">00:00</div>
    </div>

    <button id="skip-intro-btn" onclick="skipIntro()">
       <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5M13 17l5-5-5-5"/></svg>
       Bỏ qua đoạn mở đầu
    </button>

    <div id="osd"></div>
    <div id="resume-loader">
       <div class="spinner"></div>
       <span>Đang khôi phục vị trí...</span>
    </div>
    
    <div id="resume-toast">
        <div style="display:flex; flex-direction:column; gap:4px;">
           <span style="font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:0.2em; font-size:11px; color:rgba(255,255,255,0.4);">Phát tiếp từ</span>
           <span id="resume-time-text" style="color:white; font-weight:900; font-style:italic; font-size:18px; letter-spacing:-0.02em;">00:00</span>
        </div>
        <div style="display:flex; gap:12px;">
           <button onclick="confirmResume()" style="background:var(--premium-blue); color:white; border:none; padding:12px 28px; border-radius:18px; font-weight:900; font-size:13px; text-transform:uppercase; font-style:italic; cursor:pointer; box-shadow:0 10px 20px rgba(59,130,246,0.3); transition: all 0.3s;">TIẾP TỤC</button>
           <button onclick="dismissResume()" style="background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.6); border:none; width:48px; height:48px; border-radius:18px; font-weight:900; cursor:pointer; transition: all 0.3s;">✕</button>
        </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const video = document.getElementById('video');
    const previewPlayer = document.getElementById('preview-player');
    let player = null;
    let hls = null;
    let previewHls = null;
    let pendingSeek = null;
    let currentSkipTime = null;
    let seekRetryCount = 0;
    let isApplyingSeek = false;

    function formatTime(s) {
      if (isNaN(s)) return "00:00";
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : `${m}:${sec.toString().padStart(2,'0')}`;
    }

    function showOSD(text, icon = "") {
      const osd = document.getElementById('osd');
      osd.innerHTML = `<span>${icon}</span> ${text}`;
      osd.style.display = 'flex';
      setTimeout(() => osd.style.display = 'none', 3000);
    }

    function confirmResume() {
       document.getElementById('resume-toast').style.display = 'none';
       if (pendingSeek !== null) applyPendingSeek();
    }
    
    function dismissResume() {
       document.getElementById('resume-toast').style.display = 'none';
       pendingSeek = null;
    }

    function skipIntro() {
       if (currentSkipTime) {
          video.currentTime = currentSkipTime.endTime;
          document.getElementById('skip-intro-btn').style.display = 'none';
          showOSD("Đã bỏ qua intro", "⏩");
       }
    }

    function applyPendingSeek() {
       if (pendingSeek !== null && video.readyState >= 1 && !isApplyingSeek) {
          isApplyingSeek = true;
          const targetTime = pendingSeek;
          document.getElementById('resume-loader').style.display = 'flex';
          
          if (seekRetryCount === 0) {
            console.log("[PLAYER] Resuming from:", targetTime);
          }
          
          video.currentTime = targetTime;
          
          setTimeout(() => {
            const diff = Math.abs(video.currentTime - targetTime);
            if (diff > 3 && seekRetryCount < 15) {
              seekRetryCount++;
              isApplyingSeek = false;
              setTimeout(applyPendingSeek, 500);
            } else {
              document.getElementById('resume-loader').style.display = 'none';
              pendingSeek = null;
              seekRetryCount = 0;
              isApplyingSeek = false;
              showOSD("Đã khôi phục vị trí xem", "✅");
            }
          }, 1000);
       }
    }

    function initPlayer(qualities = [], defaultQuality = 0) {
      const opts = {
        controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
        settings: ['quality', 'speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        loadSprite: true,
        iconUrl: 'https://cdn.plyr.io/3.7.8/plyr.svg',
        autoplay: true,
        tooltips: { controls: true, seek: true }
      };
      
      if (qualities.length > 1) {
        opts.quality = { default: defaultQuality, options: qualities, forced: true, onChange: (v) => {
          if (hls) { if (v === 0) hls.currentLevel = -1; else hls.levels.forEach((l, i) => { if (l.height === v) hls.currentLevel = i; }); }
        }};
      }

      player = new Plyr(video, opts);
      window.parent.postMessage({ type: 'PLAYER_READY' }, '*');

      player.on('timeupdate', () => {
        window.parent.postMessage({ type: 'UPDATE_PROGRESS', time: video.currentTime, duration: video.duration }, '*');
        checkSkipIntro(video.currentTime);
      });
      player.on('pause', () => window.parent.postMessage({ type: 'VIDEO_PAUSE' }, '*'));
      player.on('play', () => {
        window.parent.postMessage({ type: 'VIDEO_PLAY' }, '*');
        if (pendingSeek !== null) applyPendingSeek();
      });
      player.on('ended', () => window.parent.postMessage({ type: 'VIDEO_ENDED' }, '*'));
      player.on('enterfullscreen', () => window.parent.postMessage({ type: 'ENTER_PSEUDO_FULLSCREEN' }, '*'));
      player.on('exitfullscreen', () => window.parent.postMessage({ type: 'EXIT_PSEUDO_FULLSCREEN' }, '*'));

      // --- Seek Preview Logic ---
      const progressInput = document.querySelector('.plyr__progress input');
      const seekPreview = document.getElementById('seek-preview');
      const seekTimeText = document.getElementById('seek-time');

      if (progressInput) {
        progressInput.addEventListener('mousemove', (e) => {
           const rect = progressInput.getBoundingClientRect();
           const percent = (e.clientX - rect.left) / rect.width;
           const targetTime = percent * video.duration;
           
           if (!isNaN(targetTime)) {
             seekPreview.style.display = 'block';
             seekPreview.style.left = `${e.clientX}px`;
             seekTimeText.innerText = formatTime(targetTime);
             previewPlayer.currentTime = targetTime;
           }
        });
        progressInput.addEventListener('mouseleave', () => {
           seekPreview.style.display = 'none';
        });
      }
    }

    let skipTimes = [];
    function checkSkipIntro(time) {
       const match = skipTimes.find(s => time >= s.startTime && time <= s.endTime);
       const skipBtn = document.getElementById('skip-intro-btn');
       if (match) {
          currentSkipTime = match;
          skipBtn.style.display = 'flex';
       } else {
          skipBtn.style.display = 'none';
       }
    }

    if (source) {
      const isM3U8 = source.includes('m3u8');
      if (isM3U8 && Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60, capLevelToPlayerSize: true });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          const qs = hls.levels.map(l => l.height).sort((a,b) => b-a);
          qs.unshift(0);
          initPlayer(qs, 0);
        });

        // Init Preview Player for HLS
        previewHls = new Hls();
        previewHls.loadSource(source);
        previewHls.attachMedia(previewPlayer);
      } else {
        video.src = source;
        previewPlayer.src = source;
        initPlayer();
      }
    }

    window.addEventListener('message', (e) => { 
      if (e.data?.type === 'HANDSHAKE_PING') {
        window.parent.postMessage({ type: 'HANDSHAKE_PONG' }, '*');
      }
      if (e.data?.type === 'SEEK') {
        const time = e.data.time;
        if (!time || time < 10) return;
        pendingSeek = time;
        document.getElementById('resume-time-text').innerText = formatTime(time);
        document.getElementById('resume-toast').style.display = 'flex';
      }
      if (e.data?.type === 'SKIP_TIMES') {
        skipTimes = e.data.times || [];
      }
    });

    window.addEventListener('keydown', (e) => {
       if (e.code === 'Space') { e.preventDefault(); if (player) player.togglePlay(); }
       if (e.code === 'ArrowRight') { if (player) player.forward(10); }
       if (e.code === 'ArrowLeft') { if (player) player.rewind(10); }
    });
  </script>
</body>
</html>
