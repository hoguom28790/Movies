<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Player Pro</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      font-family: inherit;
    }
    .plyr {
      width: 100%;
      height: 100%;
    }
    :root {
      --plyr-color-main: #0063e5; /* Disney Blue */
    }

    #error-msg {
      display: none;
      color: white;
      text-align: center;
      padding: 2rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    
    /* Seek buttons on overlay */
    .custom-skip {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .plyr--hover .custom-skip, .plyr--paused .custom-skip {
      opacity: 1;
    }
    .skip-back { left: 15%; }
    .skip-forward { right: 15%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>
<body>
  <div id="player-container" style="width: 100%; height: 100%;">
    <video id="video" playsinline crossorigin="anonymous"></video>
    <button class="custom-skip skip-back" onclick="skip(-10)" title="Lùi 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
    </button>
    <button class="custom-skip skip-forward" onclick="skip(10)" title="Tiến 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
    </button>
  </div>
  
  <div id="error-msg"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const theme = urlParams.get('theme') || 'default';
    if (theme !== 'default') document.body.classList.add('theme-' + theme);

    const video = document.getElementById('video');
    const errorMsg = document.getElementById('error-msg');
    let hls;

    function skip(seconds) {
      video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
    }

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') skip(10);
      if (e.key === 'ArrowLeft') skip(-10);
      if (e.key === ' ') {
        e.preventDefault();
        video.paused ? video.play() : video.pause();
      }
    });

    if (source) {
      // Initialize Plyr
      const player = new Plyr(video, {
        controls: [
          'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 
          'captions', 'settings', 'pip', 'airplay', 'fullscreen'
        ],
        settings: ['quality', 'speed', 'loop'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        tooltips: { controls: true, seek: true },
        keyboard: { focused: true, global: true },
        fullscreen: { iosNative: true, fallback: true },
      });

      if (Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30 });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
              default:
                hls.destroy();
                document.getElementById('player-container').style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<h2>Lỗi tải Video</h2><p>Vui lòng thử server khác.</p>';
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = source;
      }

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (hls) hls.destroy();
        player.destroy();
      });

    } else {
      document.getElementById('player-container').style.display = 'none';
    }
  </script>
</body>
</html>
