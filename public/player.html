<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Player Pro</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      font-family: inherit;
    }
    .plyr {
      width: 100%;
      height: 100%;
    }
    :root {
      --plyr-color-main: #0063e5; /* Disney Blue */
    }

    #error-msg {
      display: none;
      color: white;
      text-align: center;
      padding: 2rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    
    #brightness-overlay {
      position: absolute;
      inset: 0;
      background: black;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    #osd {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      display: none;
      z-index: 10;
      pointer-events: none;
      align-items: center;
      gap: 10px;
    }
    
    /* Seek buttons on overlay */
    .custom-skip {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .plyr--hover .custom-skip, .plyr--paused .custom-skip {
      opacity: 1;
    }
    .skip-back { left: 15%; }
    .skip-forward { right: 15%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>
<body>
  <div id="player-container" style="width: 100%; height: 100%; position: relative;">
    <video id="video" playsinline crossorigin="anonymous"></video>
    <div id="brightness-overlay"></div>
    <div id="osd"></div>
    <button class="custom-skip skip-back" onclick="skip(-10)" title="Lùi 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
    </button>
    <button class="custom-skip skip-forward" onclick="skip(10)" title="Tiến 10s">
      <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
    </button>
  </div>
  
  <div id="error-msg"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');
    const theme = urlParams.get('theme') || 'default';
    if (theme !== 'default') document.body.classList.add('theme-' + theme);

    const video = document.getElementById('video');
    const errorMsg = document.getElementById('error-msg');
    let hls;

    function skip(seconds) {
      video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
    }

    // Pro Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

      const act = () => { if (video.paused) video.play(); else video.pause(); };

      switch(e.key.toLowerCase()) {
        case ' ': // Space uses empty string or ' ' technically
        case 'k': e.preventDefault(); act(); break;
        case 'f': e.preventDefault(); if(player) player.fullscreen.toggle(); break;
        case 'm': e.preventDefault(); if(player) player.muted = !player.muted; break;
        case 'j': e.preventDefault(); skip(-10); break;
        case 'l': e.preventDefault(); skip(10); break;
        case 'arrowright': e.preventDefault(); skip(e.shiftKey ? 5 : 10); break;
        case 'arrowleft': e.preventDefault(); skip(e.shiftKey ? -5 : -10); break;
        case 'arrowup': e.preventDefault(); if(player) player.volume = Math.min(1, player.volume + 0.1); break;
        case 'arrowdown': e.preventDefault(); if(player) player.volume = Math.max(0, player.volume - 0.1); break;
        case '>': case '.': e.preventDefault(); if(player) player.speed = Math.min(2, player.speed + 0.25); break;
        case '<': case ',': e.preventDefault(); if(player) player.speed = Math.max(0.5, player.speed - 0.25); break;
      }
    });

    // Smart Touch Interface variables
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let isSwipeAction = false;
    let startVolume = 0;
    let startBrightness = 0; // 0 is max bright, 0.8 is max dark
    let activeSwipeMode = null; // 'volume' or 'brightness'

    let longPressTimer = null;
    let isSpeedingUp = false;
    let originalSpeed = 1;
    let currentBrightness = 0; // 0 to 0.8
    let lastTapTime = 0;

    const brightnessOverlay = document.getElementById('brightness-overlay');
    const osd = document.getElementById('osd');
    let osdTimer = null;

    function showOSD(text) {
      if(!osd) return;
      osd.innerHTML = text;
      osd.style.display = 'flex';
      clearTimeout(osdTimer);
      osdTimer = setTimeout(() => { osd.style.display = 'none'; }, 1500);
    }

    const container = document.getElementById('player-container');

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    container.addEventListener('touchstart', (e) => {
      // Ignore if clicking on controls or buttons
      if (e.target.closest('.plyr__controls') || e.target.closest('button')) return;
      if (e.touches.length !== 1) return; // Only 1 finger
      
      const touch = e.touches[0];
      const rect = container.getBoundingClientRect();
      touchStartX = touch.clientX - rect.left;
      touchStartY = touch.clientY - rect.top;
      touchStartTime = Date.now();
      isSwipeAction = false;
      activeSwipeMode = null;
      startVolume = player ? player.volume : 1;
      startBrightness = currentBrightness;
      
      // Set up Long Press to 2x Speed
      originalSpeed = player ? player.speed : 1;
      longPressTimer = setTimeout(() => {
        if (!isSwipeAction && !video.paused) {
          isSpeedingUp = true;
          if(player) player.speed = 2;
          showOSD(`⚡ 2x Speed`);
        }
      }, 500); // 500ms to trigger long press jump
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
      if (e.touches.length !== 1) return;
      
      const touch = e.touches[0];
      const rect = container.getBoundingClientRect();
      const currentX = touch.clientX - rect.left;
      const currentY = touch.clientY - rect.top;
      
      const deltaX = currentX - touchStartX;
      const deltaY = currentY - touchStartY;
      
      if (Math.abs(deltaX) > 10 || Math.abs(deltaY) > 10) {
        isSwipeAction = true;
        clearTimeout(longPressTimer); // Cancel long press if finger moved
      }
      
      if (isSwipeAction && Math.abs(deltaY) > Math.abs(deltaX)) {
        // Vertical sweep
        if (e.cancelable) e.preventDefault(); // prevent scrolling
        
        if (!activeSwipeMode) {
          activeSwipeMode = touchStartX < rect.width / 2 ? 'brightness' : 'volume';
        }
        
        // Sensitivity: full screen height = 1.0 change
        const deltaRatio = -(deltaY / rect.height) * 1.5; // Up = positive, multiplier for speed
        
        if (activeSwipeMode === 'volume') {
          if (isIOS) {
            showOSD(`Vui lòng dùng nút cứng để chỉnh âm lượng trên iPhone`);
            return;
          }
          let newVol = Math.max(0, Math.min(1, startVolume + deltaRatio));
          if(player) player.volume = newVol;
          showOSD(`🔊 Âm lượng: ${Math.round(newVol * 100)}%`);
        } else if (activeSwipeMode === 'brightness') {
          // 0 is bright, 0.8 is dark. Swipe up makes it brighter (meaning opacity goes toward 0)
          let newBrightness = startBrightness - (deltaRatio * 0.8);
          currentBrightness = Math.max(0, Math.min(0.8, newBrightness));
          brightnessOverlay.style.opacity = currentBrightness;
          let percent = Math.round((1 - (currentBrightness / 0.8)) * 100);
          showOSD(`☀️ Độ sáng: ${percent}%`);
        }
      }
    }, { passive: false });

    container.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);
      
      if (isSpeedingUp) {
        isSpeedingUp = false;
        if(player) player.speed = originalSpeed;
        showOSD(`▶️ 1x Speed`);
        return; 
      }
      
      if (!isSwipeAction) {
        // Treat as Tap
        const tapLength = Date.now() - touchStartTime;
        if (tapLength < 300) {
          // Could be single tap or double tap
          const timeSinceLastTap = Date.now() - lastTapTime;
          if (timeSinceLastTap > 0 && timeSinceLastTap < 400) {
            // Double tap confirmed
            const rect = container.getBoundingClientRect();
            if (touchStartX < rect.width / 2) {
              skip(-10); showRipple('left'); showOSD(`⏪ -10s`);
            } else {
              skip(10); showRipple('right'); showOSD(`+10s ⏩`);
            }
          }
          lastTapTime = Date.now();
        }
      }
    });

    function showRipple(side) {
      const btn = side === 'left' ? document.querySelector('.skip-back') : document.querySelector('.skip-forward');
      if(btn) {
        btn.style.opacity = '1';
        btn.style.transform = `translateY(-50%) scale(1.5)`;
        setTimeout(() => {
          btn.style.opacity = '0';
          btn.style.transform = `translateY(-50%) scale(1)`;
        }, 500);
      }
    }

    if (source) {
      // Initialize Plyr
      const player = new Plyr(video, {
        controls: [
          'play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 
          'captions', 'settings', 'pip', 'airplay', 'fullscreen'
        ],
        settings: ['quality', 'speed', 'loop'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
        tooltips: { controls: true, seek: true },
        keyboard: { focused: false, global: false }, // Use our custom pro keyboard listener instead
        fullscreen: { iosNative: false, fallback: true }, // DISABLE IOS NATIVE TO KEEP DOM TOUCH EVENTS
        storage: { enabled: true, key: 'disney-player' }, // Smart memory
      });

      window.player = player;

      // Handle Fullscreen natively for Desktop/Android, but fallback Pseudo-Fullscreen for iOS
      player.on('enterfullscreen', () => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(()=>{}); 
        }
        // Force tell the React Parent to go pseudo-fullscreen for iOS just in case
        window.parent.postMessage({ type: 'ENTER_PSEUDO_FULLSCREEN' }, '*');
      });

      player.on('exitfullscreen', () => {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
        window.parent.postMessage({ type: 'EXIT_PSEUDO_FULLSCREEN' }, '*');
      });

      player.on('ended', () => {
        window.parent.postMessage({ type: 'VIDEO_ENDED', url: source }, '*');
      });

      // Cross-window Data Synchronization for Resumable Playback
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'SEEK') {
          const targetTime = e.data.time;
          if (targetTime > 0) {
            const doSeek = () => {
              video.currentTime = targetTime;
              const mins = Math.floor(targetTime / 60);
              if(mins > 0) showOSD(`Tiếp tục xem từ phút thứ ${mins} 🎬`);
            };
            if (video.readyState >= 1) { // HAVE_METADATA
              doSeek();
            } else {
              video.addEventListener('loadedmetadata', doSeek, { once: true });
            }
          }
        }
      });

      // Periodically sync progress (React will throttle Firebase writes)
      setInterval(() => {
        if (!video.paused && video.currentTime > 0) {
          window.parent.postMessage({ type: 'UPDATE_PROGRESS', time: video.currentTime }, '*');
        }
      }, 5000);

      if (Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30 });
        hls.loadSource(source);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
              default:
                hls.destroy();
                document.getElementById('player-container').style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<h2>Lỗi tải Video</h2><p>Vui lòng thử server khác.</p>';
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = source;
      }

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (hls) hls.destroy();
        player.destroy();
      });

    } else {
      document.getElementById('player-container').style.display = 'none';
    }
  </script>
</body>
</html>
